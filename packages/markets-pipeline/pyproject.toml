[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "markets-pipeline"
version = "0.1.0"
dependencies = [
    "markets-core",
    "apache-airflow>=2.7.0",
    "psycopg2-binary",
    "alembic",
    "pyyaml",
]

[tool.setuptools.packages.find]
where = ["src"]